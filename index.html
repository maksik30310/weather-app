<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <link rel="stylesheet" href="https://googleapis.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Weather-App</title>
</head>
<body class="bg-slate-400 text-white min-h-screen flex flex-col font-['Inter'] ">



<!--фоновое облако света -->
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-slate-800/30 rounded-full blur-[120px] pointer-events-none z-0"></div>

<header class="bg-slate-900 h-16 w-full flex items-center justify-between px-6  border-slate-800">
    <section class="flex items-center gap-2">
    <img src="src/cloudy.png" class="brightness-0 invert h-6 w-6 object-contain" alt="logo">
    <h1 class="text-xl text-white font-bold tracking-wide"> Weather-APP

    </h1>
</section>
</header>



<input id="cityInput" type="text" placeholder="Введите город..." class="w-128 mx-auto bg-slate-800 border border-slate-700 rounded-2xl px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-white transition-colors m-20">



<!-- Семантическая навигация по дням -->
<nav class="flex items-center justify-between w-full max-w-md mx-auto mt-4 px-4 font-mono text-sm">
    
    <!-- Кнопка Вчера -->
    <button class="flex items-center gap-1 text-slate-500 hover:text-white transition-colors cursor-pointer">
        <span>←</span> <span>Вчера</span>
    </button>

     <!-- сегодня -->
    <time class="text-white font-bold border-b border-white pb-1">Сегодня</time>

    <!-- Кнопка Завтра -->
    <button class="flex items-center gap-1 text-slate-500 hover:text-white transition-colors cursor-pointer">
        <span>Завтра</span> <span>→</span>
    </button>

</nav>

<main class="flex-grow items-center flex justify-center p-4">

    <article id="weatherCard"  class="hidden bg-slate-500 rounded-3xl p-6 h-100 w-80 gap-4">
    </article>

</main>

















<footer class="mt-auto bg-slate-900 w-full py-4 text-center text-slate-500 text-sm border-t border-slate-800">
    © 2026 Weather-APP. Все права защищены.
</footer>

<script src="main.js"></script>
</body>
</html>
