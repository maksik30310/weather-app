<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Weather-App</title>
</head>
<body class="flex flex-col items-center justify-center h-screen bg-blue-300">

    <h1 class="text-3xl text-white font-bold ">
        Введи свой город и узнай погоду 
    </h1>
    <br>
    <input type="text" placeholder="Введите город" class="mt-4 p-2  rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500" id="input">


<div class="bg-blue-400 border border-slate-700 rounded-xl p-6 w-80">
    <p class="text-white text-xl font-bold md- 6 text-center" >Погода в городе</p>
    <b class="text-white text-xl font-bold md-6 text-center" id="city">температура</b>
    <br>
    <b class="text-white text-xl font-bold md-6 text-center" id="temp">Осадки</b>
</div>



</body>
</html>
